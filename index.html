    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: #f5f5f5;
            min-height: 100vh;
            min-height: 100dvh;
            overscroll-behavior: none;
        }
        
        .cat-scroll-container {
            overflow: hidden;
            position: relative;
            height: 280px;
            margin: 20px 0;
        }
        
        .cat-row {
            display: flex;
            position: absolute;
            white-space: nowrap;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        
        .cat-image {
            width: 80px;
            height: 60px;
            margin: 8px;
            display: inline-block;
        }
        
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        @keyframes scroll-right {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }
        
        .cat-scroll-container:hover .cat-row {
            animation-duration: 30s;
        }
        
        .page {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }
        
        .page.hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            transform: translateY(10px);
        }
        
        .page.fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .option {
            transition: all 0.3s ease;
        }
        
        .option:active {
            transform: scale(0.98);
        }
        
        .option.selected {
            box-shadow: 0 0 0 2px black;
            background-color: #f0f0f0;
        }
        
        .result-card {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .result-tag {
            background-color: #f5f5f5;
        }
        
        .loading-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .cat-pixel-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }
        
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            
            .cat-scroll-container {
                height: 210px;
                margin: 10px 0;
            }
            
            .cat-image {
                width: 60px;
                height: 45px;
                margin: 5px;
            }
            
            .result-card {
                padding: 20px !important;
                border-radius: 20px !important;
            }
            
            .text-xl {
                font-size: 16px !important;
            }
            
            .text-2xl {
                font-size: 20px !important;
            }
            
            .text-3xl {
                font-size: 24px !important;
            }
            
            .text-5xl {
                font-size: 32px !important;
            }
        }
        
        @media (max-width: 380px) {
            .result-tag {
                font-size: 10px !important;
                padding: 6px 10px !important;
            }
        }
    </style>
</head>

        let currentQuestion = 0;
        let selectedOption = null;
        let userScores = {};
        
        const homePage = document.getElementById('home-page');

        const loadingPage = document.getElementById('loading-page');
        const resultPage = document.getElementById('result-page');
        const startTestButton = document.getElementById('start-test');
        const backButton = document.getElementById('back-button');
        const progressElement = document.getElementById('progress');
        const catIconElement = document.getElementById('cat-icon');
        const catThoughtElement = document.getElementById('cat-thought');
        const questionElement = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const nextButton = document.getElementById('next-button');
        const saveResultButton = document.getElementById('save-result');
        const rebornButton = document.getElementById('reborn-button');
        
        function init() {
            startTestButton.addEventListener('click', startTest);
            backButton.addEventListener('click', goBack);
            nextButton.addEventListener('click', nextQuestion);
            saveResultButton.addEventListener('click', saveResult);
            optionsContainer.addEventListener('click', handleOptionClick);
        }
        
        function startTest() {
            currentQuestion = 0;
            selectedOption = null;
            userScores = {};
            
            homePage.classList.add('hidden');
            quizPage.classList.remove('hidden');
            quizPage.classList.add('fade-in');
            loadQuestion();
        }
        
        function goBack() {
            quizPage.classList.add('hidden');
            resultPage.classList.add('hidden');
            homePage.classList.remove('hidden');
        }
        
        function reborn() {
            // 清空当前选项，重置测试状态
            currentQuestion = 0;
            selectedOption = null;
            userScores = {};
            
            // 返回首页
            resultPage.classList.add('hidden');
            homePage.classList.remove('hidden');
            homePage.classList.add('fade-in');
        }
        
        function loadQuestion() {
            const question = quizData[currentQuestion];
            progressElement.textContent = `${currentQuestion + 1}/${quizData.length}`;
            catThoughtElement.textContent = question.thought;
            questionElement.textContent = question.question;
            
            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option p-3 md:p-4 border border-gray-300 rounded-lg cursor-pointer';
                optionElement.dataset.index = index;
                optionElement.innerHTML = `
                    <div class="flex items-center">
                        <div class="text-gray-400 mr-3 md:mr-4 text-sm md:text-base">${String.fromCharCode(65 + index)}</div>
                        <div class="flex-1 text-sm md:text-base">${option.text}</div>
                    </div>
                `;
                optionsContainer.appendChild(optionElement);
            });
            
            selectedOption = null;
            nextButton.classList.add('bg-gray-400');
            nextButton.classList.remove('bg-black');
            nextButton.disabled = true;
        }
        
        function handleOptionClick(e) {
            const optionElement = e.target.closest('.option');
            if (!optionElement) return;
            
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            
            optionElement.classList.add('selected');
            selectedOption = parseInt(optionElement.dataset.index);
            
            nextButton.classList.remove('bg-gray-400');
            nextButton.classList.add('bg-black');
            nextButton.disabled = false;
        }
        
        function nextQuestion() {
            if (selectedOption === null) return;
            
            const question = quizData[currentQuestion];
            const selected = question.options[selectedOption];
            
            for (const [trait, score] of Object.entries(selected.scores)) {
                if (!userScores[trait]) {
                    userScores[trait] = 0;
                }
                userScores[trait] += score;
            }
            
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                optionsContainer.style.opacity = '0';
                optionsContainer.style.transform = 'translateY(10px)';
                
                setTimeout(() => {
                    loadQuestion();
                    optionsContainer.style.opacity = '1';
                    optionsContainer.style.transform = 'translateY(0)';
                }, 200);
            } else {
                quizPage.classList.add('hidden');
                loadingPage.classList.remove('hidden');
                loadingPage.classList.add('fade-in');
                setTimeout(() => {
                    showResult();
                }, 2000);
            }
        }
        
        function calculateResult() {
            const { clingy, aloof, curious, cautious, brave, timid, sociable, playful, energetic, independent, relaxed, patient, impatient, curiosity } = userScores;
            
            const scores = {
                0: (relaxed || 0) * 1.5 + (patient || 0),  // 银渐层 - 佛系躺平
                1: (energetic || 0) * 1.5 + (playful || 0),  // 奶牛猫 - 精力过剩
                2: (independent || 0) * 1.3 + (brave || 0),  // 狸花猫 - 机智独立
                3: (cautious || 0) * 1.2 + (timid || 0),  // 黑猫 - 酷飒内向
                4: (sociable || 0) * 1.2 + (playful || 0),  // 暹罗猫 - 话痨型
                5: (clingy || 0) + (impatient || 0) * 0.8,  // 三花猫 - 古灵精怪
                6: (energetic || 0) * 1.2 + (curiosity || 0 || 0),  // 奶牛猫备选 - 精力旺盛
                7: (relaxed || 0) + (patient || 0) * 0.8,  // 橘猫 - 贪吃大脸
                8: (clingy || 0) + (patient || 0),  // 布偶猫 - 优雅粘人
                9: (energetic || 0) * 1.3 + (curiosity || 0 || 0),  // 奶牛猫 - 逻辑鬼才
                10: (independent || 0) * 1.2 + (patient || 0),  // 三花猫 - 心思细腻
                11: (curiosity || 0 || 0) * 1.5 + (relaxed || 0) * 0.5,  // 英短蓝猫 - 好奇心重
                12: (cautious || 0) * 1.3 + (independent || 0)  // 俄罗斯蓝猫 - 高冷安静
            };
            
            let maxScore = -1;
            let resultIndex = 0;
            
            for (const [index, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    resultIndex = parseInt(index);
                }
            }
            
            return catResults[resultIndex];
        }
        
        function showResult() {
            loadingPage.classList.add('hidden');
            resultPage.classList.remove('hidden');
            resultPage.classList.add('fade-in');
            
            const result = calculateResult();
            const resultIndex = catResults.findIndex(r => r.type === result.type);
            
            document.getElementById('result-date').textContent = new Date().toLocaleDateString('zh-CN');
            const resultCatIcon = document.getElementById('result-cat-icon');
            resultCatIcon.className = `w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center text-5xl md:text-6xl overflow-hidden ${result.iconBg}`;

            document.getElementById('result-title').textContent = result.title;
            document.getElementById('result-subtitle').textContent = result.subtitle;
            document.getElementById('result-monologue').textContent = result.monologue;
            document.getElementById('result-description').textContent = result.description;
            
            const tagsContainer = document.getElementById('result-tags');
            tagsContainer.innerHTML = '';

                tagElement.textContent = tag;
                tagsContainer.appendChild(tagElement);
            });
            
            console.log('测试完成！用户分数：', userScores);
            console.log('测试结果：', result);
        }
        
        async function saveResult() {
            const resultCard = document.getElementById('result-card');
            
            try {
                saveResultButton.textContent = '正在生成图片...';
                saveResultButton.disabled = true;
                
                const canvas = await html2canvas(resultCard, {
                    backgroundColor: '#ffffff',
                    scale: 2
                });
                
                const link = document.createElement('a');
                link.download = `CATTI结果_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                saveResultButton.textContent = '保存结果，分享给朋友';
                saveResultButton.disabled = false;
            } catch (error) {
                console.error('保存失败：', error);
                saveResultButton.textContent = '保存失败，请重试';
                setTimeout(() => {
                    saveResultButton.textContent = '保存结果，分享给朋友';
                    saveResultButton.disabled = false;
                }, 2000);
            }
        }
        
        init();
    </script>
